[build]
  base = "."
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://converthub-api.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200